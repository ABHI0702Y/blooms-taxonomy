{% extends 'base.html' %}
{% block title %}Log In{% endblock %}
{% block extra_head %}
<style>
  .auth-card { max-width: 420px; margin: 4rem auto; }
  .auth-header { background: linear-gradient(135deg,#0f0c29,#1e1b4b 40%,#4f46e5); color:#fff; border-radius:12px 12px 0 0; padding: 2rem; text-align:center; position:relative; overflow:hidden; }
  .auth-header::before { content:''; position:absolute; inset:0; background: radial-gradient(circle at 80% 20%, rgba(245,158,11,.3), transparent 60%); }
  .auth-header i { font-size: 2.5rem; color: #f59e0b; position:relative; }
  .auth-header h4, .auth-header small { position: relative; }
</style>
{% endblock %}
{% block body %}
<div class="container auth-card">
  <div class="card">
    <div class="auth-header">
      <i class="bi bi-person-circle d-block mb-2"></i>
      <h4 class="fw-bold mb-0">Faculty Login</h4>
      <small>Bloom's Question Paper Generator</small>
    </div>
    <div class="card-body p-4">
      <form action="" method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-bold">Email / Username</label>
          <input type="text" name="username" class="form-control form-control-lg" placeholder="Enter your email" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label fw-bold">Password</label>
          <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter password" required>
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-primary btn-lg fw-bold">Log In <i class="bi bi-arrow-right ms-1"></i></button>
        </div>
      </form>
      <hr class="my-3">
      <p class="text-center text-muted small mb-0">Don't have an account? <a href="/register" class="text-decoration-none fw-bold">Register here</a></p>
    </div>
  </div>
</div>
{% endblock %}
