providers = ["python"]

[phases.setup]
nixPkgs = ["python311", "gcc", "libpq"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "cd BLOOMS_TAXONOMY/question_paper_builder && python manage.py migrate && python manage.py collectstatic --noinput && python manage.py populate_data && gunicorn question_paper_builder.wsgi --bind 0.0.0.0:$PORT --workers 2 --log-file -"
